<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spike 3: Wasm in WebWorker</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #111; color: #eee; }
    #result { margin-top: 1rem; font-size: 1.5rem; color: #4af; }
  </style>
</head>
<body>
  <h1>Spike 3: Wasm in WebWorker</h1>
  <p>Sending query to worker... (check console for timing)</p>
  <div id="result">waiting...</div>

  <script>
    const worker = new Worker('./worker.js');

    worker.onmessage = (event) => {
      const { type, value } = event.data;
      if (type === 'ready') {
        // Worker has initialised Wasm — now safe to send the query
        worker.postMessage({ type: 'query', start: 1, end: 1_000_000 });
      } else if (type === 'result') {
        document.getElementById('result').textContent = `sum_range(1, 1_000_000) = ${value}`;
      }
    };

    worker.onerror = (err) => {
      document.getElementById('result').textContent = `Worker error: ${err.message}`;
      console.error('Worker error:', err);
    };

    // Query is sent after worker signals 'ready'
  </script>
</body>
</html>
